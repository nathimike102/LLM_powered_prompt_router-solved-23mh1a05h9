services:
  prompt-router:
    build: .
    container_name: llm-powered-prompt-router
    ports:
      - "${HOST_PORT:-8088}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
    volumes:
      - ./route_log.jsonl:/app/route_log.jsonl
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
